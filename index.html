<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SDT Booking Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f4f6f9;--white:#fff;--teal:#2B9EB3;--teal-dark:#1E6F8A;--teal-light:#e8f6f9;
  --teal-mid:#d0edf3;--navy:#1A2B4A;--orange:#F5A623;--orange-light:#fef6e7;
  --border:#dde3ea;--txt:#1A2B4A;--muted:#6b7a8d;--warn:#e05a2b;--warn-bg:#fef0eb;
  --warn-bdr:#f5b69a;--success:#1a9b6c;--success-bg:#e8f7f2;--success-bdr:#a3ddc9;
  --shadow:0 1px 3px rgba(26,43,74,.08),0 4px 12px rgba(26,43,74,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;}
.app-container{max-width:800px;margin:0 auto;padding:20px;}
.header{display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:var(--shadow);}
.header h1{color:var(--white);font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.card{background:var(--white);border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border);}
.section-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;border-bottom:2px solid var(--teal-light);padding-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:13px;font-weight:600;color:var(--muted);}
input,select,textarea{padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;color:var(--txt);transition:all 0.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-light);}
textarea{height:80px;resize:vertical;}
.avail-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:10px;}
.avail-head{font-size:11px;font-weight:700;text-align:center;color:var(--muted);padding-bottom:4px;}
.avail-row-label{font-size:12px;font-weight:600;display:flex;align-items:center;}
.avail-box{height:36px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;}
.avail-box.selected{background:var(--teal);border-color:var(--teal);color:white;}
.btn{background:var(--teal);color:white;border:none;padding:18px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:all 0.2s;box-shadow:0 4px 12px rgba(43,158,179,0.3);}
.btn:hover{background:var(--teal-dark);transform:translateY(-1px);}
.btn:active{transform:translateY(1px);}
.btn:disabled{background:var(--muted);opacity:0.7;cursor:not-allowed;}
.status-bar{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.dot.active{background:var(--orange);box-shadow:0 0 8px var(--orange);}
.res{margin-top:24px;border-radius:16px;overflow:hidden;border:1px solid var(--teal-mid);animation:fadeIn 0.4s ease-out;}
.rh{background:var(--teal-mid);padding:14px 20px;font-weight:700;color:var(--teal-dark);font-size:15px;}
.rb{background:white;padding:20px;font-size:15px;line-height:1.6;white-space:pre-wrap;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app-container">
  <div class="header"><h1>SDT Booking Assistant</h1></div>
  <div class="card">
    <div class="section-title">Client Details</div>
    <div class="grid">
      <div class="field"><label>Client Name</label><input type="text" id="name" placeholder="Full Name"></div>
      <div class="field"><label>Location (Suburb)</label><input type="text" id="suburb" placeholder="e.g. Werribee"></div>
      <div class="field"><label>Funding Body</label><select id="funding"><option>NDIS</option><option>TAC</option><option>WorkCover</option><option>Private/Other</option></select></div>
      <div class="field"><label>Lesson Duration</label><select id="duration"><option value="60">60 mins</option><option value="90" selected>90 mins</option><option value="120">120 mins</option></select></div>
    </div>
    <div class="section-title">Vehicle & Mods</div>
    <div class="grid">
      <div class="field"><label>Modifications Needed</label><input type="text" id="modNeeded" placeholder="e.g. Left foot accelerator"></div>
      <div class="field"><label>Specific Mod Details</label><input type="text" id="modNts" placeholder="Model names if known"></div>
    </div>
    <div class="section-title">Availability</div>
    <div class="avail-grid">
      <div></div><div class="avail-head">Mon</div><div class="avail-head">Tue</div><div class="avail-head">Wed</div><div class="avail-head">Thu</div><div class="avail-head">Fri</div>
      <div class="avail-row-label">AM</div>
      <div class="avail-box" data-day="Mon" data-time="AM"></div>
      <div class="avail-box" data-day="Tue" data-time="AM"></div>
      <div class="avail-box" data-day="Wed" data-time="AM"></div>
      <div class="avail-box" data-day="Thu" data-time="AM"></div>
      <div class="avail-box" data-day="Fri" data-time="AM"></div>
      <div class="avail-row-label">PM</div>
      <div class="avail-box" data-day="Mon" data-time="PM"></div>
      <div class="avail-box" data-day="Tue" data-time="PM"></div>
      <div class="avail-box" data-day="Wed" data-time="PM"></div>
      <div class="avail-box" data-day="Thu" data-time="PM"></div>
      <div class="avail-box" data-day="Fri" data-time="PM"></div>
    </div>
    <div class="section-title">Preferences & Notes</div>
    <div class="grid">
      <div class="field"><label>Instructor Preference</label><input type="text" id="instP"></div>
      <div class="field"><label>Gender Preference</label><select id="genP"><option value="None">No Preference</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
    </div>
    <div class="field" style="margin-bottom:15px;"><label>Scheduling Notes (Specific times etc)</label><textarea id="schNotes"></textarea></div>
    <div class="field"><label>General/Other Notes</label><textarea id="othNts"></textarea></div>
    <div style="margin-top:30px;">
      <button class="btn" id="subBtn">Analyse & Recommend Instructor</button>
      <div class="status-bar"><div class="dot" id="dot"></div><span id="statText">Ready</span></div>
    </div>
  </div>
  <div id="aiOut"></div>
</div>
<script>
const boxes = document.querySelectorAll(".avail-box");
boxes.forEach(b => {
  b.addEventListener("click", () => b.classList.toggle("selected"));
});
function gv(id){return document.getElementById(id).value;}
function setStatus(t,active){
  document.getElementById("statText").innerText=t;
  document.getElementById("dot").className=active?"dot active":"dot";
}
function esc(t){
  if(!t)return "";
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function collectAvail(){
  let selected = [];
  document.querySelectorAll(".avail-box.selected").forEach(b => {
    selected.push(b.getAttribute("data-day") + " " + b.getAttribute("data-time"));
  });
  return selected.join(", ") || "No specific availability selected";
}
document.getElementById("subBtn").addEventListener("click",function(){
  const btn = this;
  const name = gv("name") || "New Client";
  btn.disabled=true;
  setStatus("Consulting SDT Intelligence...",true);
  document.getElementById("aiOut").innerHTML="";
  const payload = {
    clientName:name,
    suburb:gv("suburb"),
    funding:gv("funding"),
    availability:collectAvail(),
    duration:gv("duration"),
    modifications:gv("modNeeded"),
    modNotes:gv("modNts"),
    instructorPreference:gv("instP"),
    genderPreference:gv("genP"),
    schedulingNotes:gv("schNotes"),
    otherNotes:gv("othNts")
  };
  fetch("https://sdt-booking-backend-production.up.railway.app/analyse",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  })
  .then(r => r.json().then(data => ({ok:r.ok, status:r.status, data:data})))
  .then(result => {
    if(!result.ok) throw new Error(result.data.error || "Server error: " + result.status);
    let text = "";
    const d = result.data;
    if(d.content && d.content.length){
      d.content.forEach(c => { if(c.type === "text") text += c.text; });
    }
    if(!text) text = "Recommendation received but content was empty.";
    document.getElementById("aiOut").innerHTML=`<div class='res'><div class='rh'>&#10003; Recommendation for ${esc(name)}</div><div class='rb'>${esc(text)}</div></div>`;
    setStatus("Analysis Complete",false);
  })
  .catch(e => {
    document.getElementById("aiOut").innerHTML=`<div class='res'><div class='rh' style='background:#fef0eb;color:#e05a2b;'>Error Occurred</div><div class='rb'>${esc(e.message)}</div></div>`;
    setStatus("Error",false);
  })
  .finally(() => { btn.disabled=false; });
});
</script>
</body>
</html>
