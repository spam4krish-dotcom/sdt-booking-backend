<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SDT Booking Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg:#f4f6f9;--white:#fff;--teal:#2B9EB3;--teal-dark:#1E6F8A;--teal-light:#e8f6f9;
  --teal-mid:#d0edf3;--navy:#1A2B4A;--orange:#F5A623;--orange-light:#fef6e7;
  --border:#dde3ea;--txt:#1A2B4A;--muted:#6b7a8d;--warn:#e05a2b;--warn-bg:#fef0eb;
  --warn-bdr:#f5b69a;--success:#1a9b6c;--success-bg:#e8f7f2;--success-bdr:#a3ddc9;
  --shadow:0 1px 3px rgba(26,43,74,.08),0 4px 12px rgba(26,43,74,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;}
.app-container{max-width:800px;margin:0 auto;padding:20px;}
.header{display:flex;align-items:center;justify-content:center;background:var(--navy);padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:var(--shadow);}
.header h1{color:var(--white);font-size:22px;font-weight:700;letter-spacing:-0.5px;}
.card{background:var(--white);border-radius:16px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px;border:1px solid var(--border);}
.section-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:20px;display:flex;align-items:center;border-bottom:2px solid var(--teal-light);padding-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:600px){.grid{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:13px;font-weight:600;color:var(--muted);}
input,select,textarea{padding:12px 14px;border:1px solid var(--border);border-radius:10px;font-size:15px;color:var(--txt);transition:all 0.2s;background:white;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 4px var(--teal-light);}
textarea{height:72px;resize:vertical;}

/* ── Mod Checkboxes ── */
.mod-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:500px){.mod-grid{grid-template-columns:1fr;}}
.mod-option{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:var(--txt);padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.15s;}
.mod-option:hover{border-color:var(--teal);background:var(--teal-light);}
.mod-option input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);cursor:pointer;flex-shrink:0;}
.mod-option:has(input:checked){border-color:var(--teal);background:var(--teal-light);color:var(--teal-dark);}

/* ── Availability Slots ── */
.avail-slots{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;}
.avail-slot{background:var(--teal-light);border:1.5px solid var(--teal-mid);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;position:relative;}
.avail-slot-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:500px){.avail-slot-row{grid-template-columns:1fr;}}
.avail-slot select{background:white;font-size:14px;}
.avail-slot textarea{height:56px;font-size:13px;background:white;}
.avail-slot-label{font-size:12px;font-weight:700;color:var(--teal-dark);margin-bottom:2px;}
.remove-slot{position:absolute;top:10px;right:12px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 6px;border-radius:6px;transition:all 0.15s;}
.remove-slot:hover{background:var(--warn-bg);color:var(--warn);}
.add-slot-btn{display:flex;align-items:center;gap:8px;background:none;border:2px dashed var(--teal-mid);color:var(--teal-dark);font-size:14px;font-weight:600;padding:12px 16px;border-radius:12px;cursor:pointer;width:100%;justify-content:center;transition:all 0.2s;}
.add-slot-btn:hover{background:var(--teal-light);border-color:var(--teal);}

.btn{background:var(--teal);color:white;border:none;padding:18px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;width:100%;transition:all 0.2s;box-shadow:0 4px 12px rgba(43,158,179,0.3);}
.btn:hover{background:var(--teal-dark);transform:translateY(-1px);}
.btn:active{transform:translateY(1px);}
.btn:disabled{background:var(--muted);opacity:0.7;cursor:not-allowed;}
.status-bar{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:500;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--border);}
.dot.active{background:var(--orange);box-shadow:0 0 8px var(--orange);}
.res{margin-top:24px;border-radius:16px;overflow:hidden;border:1px solid var(--teal-mid);animation:fadeIn 0.4s ease-out;}
.rh{background:var(--teal-mid);padding:14px 20px;font-weight:700;color:var(--teal-dark);font-size:15px;}
.rb{background:white;padding:20px;font-size:15px;line-height:1.6;white-space:pre-wrap;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app-container">
  <div class="header"><h1>SDT Booking Assistant</h1></div>
  <div class="card">
    <div class="section-title">Client Details</div>
    <div class="grid">
      <div class="field"><label>Client Name</label><input type="text" id="name" placeholder="Full Name"></div>
      <div class="field"><label>Location (Suburb)</label><input type="text" id="suburb" placeholder="e.g. Werribee"></div>
      <div class="field"><label>Funding Body</label><select id="funding"><option>NDIS</option><option>TAC</option><option>WorkCover</option><option>Private/Other</option></select></div>
      <div class="field"><label>Lesson Duration</label><select id="duration"><option value="60">60 mins</option><option value="90" selected>90 mins</option><option value="120">120 mins</option></select></div>
    </div>

    <div class="section-title">Vehicle & Mods</div>
    <div class="field" style="margin-bottom:16px;">
      <label>Modifications Needed</label>
      <div class="mod-grid">
        <label class="mod-option"><input type="checkbox" value="LFA"> Left Foot Accelerator (LFA)</label>
        <label class="mod-option"><input type="checkbox" value="Spinner"> Spinner Knob</label>
        <label class="mod-option"><input type="checkbox" value="Electronic Spinner"> Electronic Spinner</label>
        <label class="mod-option"><input type="checkbox" value="Hand Controls"> Hand Controls</label>
        <label class="mod-option"><input type="checkbox" value="Satellite"> Satellite Accelerator</label>
        <label class="mod-option"><input type="checkbox" value="O-Ring"> Oval Ring (O-Ring) Accelerator</label>
        <label class="mod-option"><input type="checkbox" value="Monarchs"> Monarchs</label>
        <label class="mod-option"><input type="checkbox" value="Extension Pedals"> Extension Pedals</label>
      </div>
    </div>
    <div class="field" style="margin-bottom:20px;"><label>Specific Mod Details <span style="font-weight:400;color:var(--muted)">(optional — model names, L/R hand etc.)</span></label><input type="text" id="modNts" placeholder="e.g. RHS spinner, Lodgesons LFA"></div>

    <div class="section-title">Availability</div>
    <div class="avail-slots" id="availSlots"></div>
    <button class="add-slot-btn" id="addSlotBtn" onclick="addSlot()">+ Add Availability Window</button>

    <div class="section-title" style="margin-top:24px;">Preferences & Notes</div>
    <div class="grid">
      <div class="field"><label>Instructor Preference</label><input type="text" id="instP"></div>
      <div class="field"><label>Gender Preference</label><select id="genP"><option value="None">No Preference</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
    </div>
    <div class="field" style="margin-bottom:15px;"><label>General/Other Notes</label><textarea id="othNts"></textarea></div>

    <div style="margin-top:30px;">
      <button class="btn" id="subBtn">Analyse & Recommend Instructor</button>
      <div class="status-bar"><div class="dot" id="dot"></div><span id="statText">Ready</span></div>
    </div>
  </div>
  <div id="aiOut"></div>
</div>

<script>
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
const BLOCKS = [
  { value:"early-morning", label:"Early Morning (8am – 10am)" },
  { value:"mid-morning",   label:"Mid Morning (10am – 12pm)" },
  { value:"afternoon",     label:"Afternoon (12pm – 2pm)" },
  { value:"late-afternoon",label:"Late Afternoon (2pm – 5:30pm)" },
  { value:"all-day",       label:"All Day" },
];

// Short day name for backend
const DAY_SHORT = { Monday:"Mon", Tuesday:"Tue", Wednesday:"Wed", Thursday:"Thu", Friday:"Fri" };

let slotCount = 0;

function addSlot() {
  if (slotCount >= 5) return;
  slotCount++;
  const container = document.getElementById("availSlots");
  const idx = slotCount;

  const div = document.createElement("div");
  div.className = "avail-slot";
  div.id = `slot-${idx}`;

  const dayOpts = DAYS.map(d => `<option value="${d}">${d}</option>`).join("");
  const blockOpts = BLOCKS.map(b => `<option value="${b.value}">${b.label}</option>`).join("");

  div.innerHTML = `
    <button class="remove-slot" onclick="removeSlot(${idx})" title="Remove">×</button>
    <div class="avail-slot-label">Availability Window ${idx}</div>
    <div class="avail-slot-row">
      <div class="field">
        <label>Day</label>
        <select id="slot-day-${idx}">${dayOpts}</select>
      </div>
      <div class="field">
        <label>Time Block</label>
        <select id="slot-block-${idx}">${blockOpts}</select>
      </div>
    </div>
    <div class="field">
      <label>Notes for this window <span style="font-weight:400;color:var(--muted)">(optional — e.g. "must finish by 9am")</span></label>
      <textarea id="slot-notes-${idx}" placeholder="e.g. Need to drop kids at school by 9am, so must finish before then"></textarea>
    </div>
  `;
  container.appendChild(div);

  if (slotCount >= 5) document.getElementById("addSlotBtn").style.display = "none";
}

function removeSlot(idx) {
  const el = document.getElementById(`slot-${idx}`);
  if (el) el.remove();
  slotCount--;
  document.getElementById("addSlotBtn").style.display = "";
}

function collectAvailability() {
  const parts = [];
  const notes = {};
  for (let i = 1; i <= 10; i++) {
    const dayEl = document.getElementById(`slot-day-${i}`);
    const blockEl = document.getElementById(`slot-block-${i}`);
    const notesEl = document.getElementById(`slot-notes-${i}`);
    if (!dayEl || !blockEl) continue;
    const shortDay = DAY_SHORT[dayEl.value];
    const block = blockEl.value;
    parts.push(`${shortDay}:${block}`);
    if (notesEl && notesEl.value.trim()) {
      notes[`${shortDay}:${block}`] = notesEl.value.trim();
    }
  }
  return {
    availability: parts.join(", ") || "No specific availability selected",
    availabilityNotes: notes
  };
}

function gv(id){ return document.getElementById(id).value; }
function setStatus(t, active){
  document.getElementById("statText").innerText = t;
  document.getElementById("dot").className = active ? "dot active" : "dot";
}
function esc(t){
  if(!t) return "";
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// Start with one slot open
addSlot();

document.getElementById("subBtn").addEventListener("click", function(){
  const btn = this;
  const name = gv("name") || "New Client";
  btn.disabled = true;
  setStatus("Consulting SDT Intelligence...", true);
  document.getElementById("aiOut").innerHTML = "";

  const { availability, availabilityNotes } = collectAvailability();

  // Collect checked mods
  const checkedMods = [...document.querySelectorAll('.mod-option input[type=checkbox]:checked')].map(cb => cb.value);

  const payload = {
    clientName: name,
    suburb: gv("suburb"),
    funding: gv("funding"),
    availability,
    availabilityNotes,
    duration: gv("duration"),
    modifications: checkedMods.join(", "),
    modNotes: gv("modNts"),
    instructorPreference: gv("instP"),
    genderPreference: gv("genP"),
    otherNotes: gv("othNts")
  };

  fetch("https://sdt-booking-backend-production.up.railway.app/analyse", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  })
  .then(r => r.json().then(data => ({ ok: r.ok, status: r.status, data })))
  .then(result => {
    if (!result.ok) {
      // Structured error from backend
      const errType = result.data.errorType || "general";
      const errMsg = result.data.error || "Unknown error";
      const errTitles = {
        auth: "Authentication Error",
        credits: "Anthropic Credits Exhausted",
        rate_limit: "Rate Limit Reached",
        nookal: "Nookal API Error",
        timeout: "Request Timed Out",
        network: "Network Error",
        validation: "Missing Information",
        general: "Error Occurred"
      };
      const title = errTitles[errType] || "Error Occurred";
      const actions = {
        auth: "Check that Railway environment variables (NOOKAL_API_KEY, ANTHROPIC_API_KEY) are correct and haven't expired.",
        credits: "Top up Anthropic credits at console.anthropic.com, then try again.",
        rate_limit: "Wait 30 seconds and try again.",
        nookal: "Check Nookal API status. Keys may need to be regenerated in Nookal settings.",
        timeout: "The Nookal or Google Maps API is slow. Wait a moment and try again.",
        network: "Check your internet connection and try again.",
        validation: "Fill in the missing fields and try again.",
        general: "Try again. If the error persists, check Railway logs."
      };
      throw { title, message: errMsg, action: actions[errType] || "" };
    }
    let text = "";
    const d = result.data;
    if (d.content && d.content.length) {
      d.content.forEach(c => { if (c.type === "text") text += c.text; });
    }
    if (!text) text = "Recommendation received but content was empty.";
    document.getElementById("aiOut").innerHTML = `<div class='res'><div class='rh'>&#10003; Recommendation for ${esc(name)}</div><div class='rb'>${esc(text)}</div></div>`;
    setStatus("Analysis Complete", false);
  })
  .catch(e => {
    const title = e.title || "Error Occurred";
    const message = e.message || String(e);
    const action = e.action || "";
    const body = action ? `${message}\n\nSuggested action: ${action}` : message;
    document.getElementById("aiOut").innerHTML = `<div class='res'><div class='rh' style='background:#fef0eb;color:#e05a2b;'>⚠️ ${esc(title)}</div><div class='rb'>${esc(body)}</div></div>`;
    setStatus("Error", false);
  })
  .finally(() => { btn.disabled = false; });
});
</script>
</body>
</html>
